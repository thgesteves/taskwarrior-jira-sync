name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check Python syntax
        run: python3 -m py_compile bin/taskwarrior-jira-sync

      - name: Run tests
        run: python3 -m unittest discover -s tests

      - name: Check shell scripts
        run: bash -n install.sh uninstall.sh configure-reports.sh hooks/on-modify.taskwarrior-jira-sync
